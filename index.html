<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TNRA 爱心驿站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 强制隐藏滚动条，保持App感 */
        body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        iframe { flex: 1; border: none; width: 100%; }
        .nav-item { color: #94a3b8; font-size: 14px; font-weight: 500; }
        .nav-item.active { color: #f97316; font-weight: bold; }
    </style>
</head>
<body class="bg-white">

    <header class="h-16 flex items-center justify-center border-b border-gray-100 bg-white shrink-0">
        <h1 class="text-lg font-black tracking-widest text-gray-800">TNRA 爱心驿站</h1>
    </header>

    <iframe src="home.html" name="contentFrame"></iframe>

    <nav class="h-20 border-t border-gray-100 bg-white flex justify-around items-center shrink-0 shadow-lg">
        <a href="home.html" target="contentFrame" class="nav-item active" onclick="updateNav(this)">首页</a>
        <a href="adopt_page.html" target="contentFrame" class="nav-item" onclick="updateNav(this)">档案</a>
        <a href="diary_page.html" target="contentFrame" class="nav-item" onclick="updateNav(this)">云养</a>
        <a href="#" class="nav-item">设置</a>
    </nav>

    <script>
        function updateNav(el) {
            // 点击时切换文字颜色加粗效果
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active', 'text-orange-500'));
            el.classList.add('active', 'text-orange-500');
        }
    </script>
</body>
</html>
