<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNRA爱心驿站 - 领养</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-24">
    <div class="p-4">
        <h2 class="text-2xl font-bold mb-4">猫咪档案</h2>
        <div class="bg-white rounded-3xl overflow-hidden shadow-md mb-6">
            <div class="h-48 bg-gray-200 flex items-center justify-center text-gray-400">猫咪照片占位</div>
            <div class="p-6">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-xl font-bold text-gray-800">小橘</h3>
                    <span class="bg-orange-100 text-orange-600 text-xs px-2 py-1 rounded">2岁 | 公</span>
                </div>
                <p class="text-gray-500 text-sm leading-relaxed">性格粘人、活泼。非常喜欢在院子里晒太阳，抓蝴蝶。</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-6 shadow-md">
            <h3 class="text-lg font-bold mb-4 text-orange-500">提交领养申请</h3>
            <form class="space-y-4">
                <input type="text" placeholder="您的姓名" class="w-full bg-gray-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-orange-500">
                <input type="tel" placeholder="联系电话" class="w-full bg-gray-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-orange-500">
                <textarea placeholder="领养理由" rows="3" class="w-full bg-gray-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-orange-500"></textarea>
                <button type="submit" class="w-full bg-orange-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-orange-200 active:scale-95 transition-transform">提交申请</button>
            </form>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-20 px-6">
        <a href="index.html" class="flex flex-col items-center text-gray-400">
            <span class="text-2xl">🏠</span>
            <span class="text-[10px] mt-1">首页</span>
        </a>
        <a href="adopt.html" class="flex flex-col items-center text-orange-500 font-bold">
            <span class="text-2xl">📂</span>
            <span class="text-[10px] mt-1">档案</span>
        </a>
        <a href="diary.html" class="flex flex-col items-center text-gray-400">
            <span class="text-2xl">☁️</span>
            <span class="text-[10px] mt-1">云养</span>
        </a>
        <div class="flex flex-col items-center text-gray-400">
            <span class="text-2xl">⚙️</span>
            <span class="text-[10px] mt-1">设置</span>
        </div>
    </nav>
</body>
</html>
