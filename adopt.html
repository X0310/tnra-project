<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNRA 爱心驿站 - 领养</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>猫咪档案</h1>
    </header>
    <main>
        <div class="cat-profile">
            <img src="images/cat1.jpg" alt="猫咪1">
            <h2>姓名：小橘</h2>
            <p>年龄：2岁</p>
            <p>性别：公</p>
            <p>性格：粘人、活泼</p>
        </div>
        <hr>
        <div class="adoption-form">
            <h2>领养申请</h2>
            <form>
                <label for="name">姓名:</label>
                <input type="text" id="name" name="name" required><br><br>
                <label for="phone">电话:</label>
                <input type="tel" id="phone" name="phone" required><br><br>
                <label for="address">地址:</label>
                <input type="text" id="address" name="address" required><br><br>
                <label for="reason">领养理由:</label>
                <textarea id="reason" name="reason" rows="4" required></textarea><br><br>
                <button type="submit">提交申请</button>
            </form>
        </div>
    </main>
    <footer>
        <nav class="bottom-nav">
            <a href="index.html">首页</a>
            <a href="adopt.html" class="active">档案</a>
            <a href="diary.html">云养</a>
            <a href="#">设置</a>
        </nav>
    </footer>
</body>
</html>
